<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaltrixAI - Reportar Bug / Vulnerabilidade</title>
    <style>
        /* ===== RESET E BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0c0c0c;
            color: #d4d4d4;
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 24px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 16px;
        }

        /* ===== FORMULÁRIO ===== */
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #bbb;
        }
        label .req {
            color: #ff3860;
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 12px;
            color: #eee;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border 0.2s;
            resize: vertical;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4f8fff;
        }
        textarea {
            min-height: 90px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
        }
        select {
            cursor: pointer;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }

        /* ===== SEVERIDADE ===== */
        .severity-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .sev-btn {
            background: #1e1e1e;
            border: 2px solid #333;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .sev-btn:hover {
            border-color: #666;
        }
        .sev-btn.selected {
            border-color: #fff;
            color: #fff;
        }
        .sev-btn.crit { color: #ff3860; }
        .sev-btn.high { color: #ff6b4a; }
        .sev-btn.med  { color: #ffab3d; }
        .sev-btn.low  { color: #3fb986; }
        .sev-btn.crit.selected { background: rgba(255,56,96,0.15); border-color: #ff3860; }
        .sev-btn.high.selected { background: rgba(255,107,74,0.15); border-color: #ff6b4a; }
        .sev-btn.med.selected  { background: rgba(255,171,61,0.15); border-color: #ffab3d; }
        .sev-btn.low.selected  { background: rgba(63,185,134,0.15); border-color: #3fb986; }

        /* ===== BOTÃO ===== */
        .btn-enviar {
            background: #4f8fff;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-enviar:hover {
            background: #5d9fff;
        }
        .btn-enviar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== MENSAGENS ===== */
        .msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .msg.success {
            background: rgba(63,185,134,0.15);
            border-left: 3px solid #3fb986;
            color: #3fb986;
        }
        .msg.error {
            background: rgba(255,56,96,0.15);
            border-left: 3px solid #ff3860;
            color: #ff3860;
        }
        .msg.info {
            background: rgba(79,143,255,0.1);
            border-left: 3px solid #4f8fff;
            color: #4f8fff;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 500px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🐛</span> Reportar Problema
        </h1>
        <p class="subtitle">
            Envie bugs, falhas de segurança ou vulnerabilidades encontradas na PaltrixAI.<br>
            Todos os reportes são enviados diretamente para nossa equipe via Discord.
        </p>

        <!-- FORMULÁRIO -->
        <form id="reportForm">
            <!-- Título -->
            <div class="form-group">
                <label for="title">Título do reporte <span class="req">*</span></label>
                <input type="text" id="title" name="title" placeholder="Ex: Exposição de chave de API no código cliente" required maxlength="200">
            </div>

            <!-- Tipo e Severidade -->
            <div class="row">
                <div class="form-group">
                    <label for="type">Tipo <span class="req">*</span></label>
                    <select id="type" name="type" required>
                        <option value="">Selecione...</option>
                        <option value="security">🔒 Segurança</option>
                        <option value="bug">🐛 Bug</option>
                        <option value="privacy">🔐 Privacidade</option>
                        <option value="performance">⚡ Performance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Severidade <span class="req">*</span></label>
                    <div class="severity-options" id="severityGroup">
                        <span class="sev-btn crit" data-sev="crit">Crítica</span>
                        <span class="sev-btn high" data-sev="high">Alta</span>
                        <span class="sev-btn med" data-sev="med">Média</span>
                        <span class="sev-btn low selected" data-sev="low">Baixa</span>
                    </div>
                    <input type="hidden" name="severity" id="severityInput" value="low">
                </div>
            </div>

            <!-- Descrição -->
            <div class="form-group">
                <label for="description">Descrição detalhada <span class="req">*</span></label>
                <textarea id="description" name="description" placeholder="Explique o que encontrou, incluindo impacto potencial..." required></textarea>
            </div>

            <!-- Comportamento esperado/real (opcionais, mas úteis) -->
            <div class="row">
                <div class="form-group">
                    <label for="expected">Comportamento esperado</label>
                    <textarea id="expected" name="expected" rows="2" placeholder="O que deveria acontecer?"></textarea>
                </div>
                <div class="form-group">
                    <label for="actual">Comportamento atual</label>
                    <textarea id="actual" name="actual" rows="2" placeholder="O que realmente acontece?"></textarea>
                </div>
            </div>

            <!-- Contato -->
            <div class="form-group">
                <label for="contact">Contato (e-mail ou Discord) <span class="req">*</span></label>
                <input type="text" id="contact" name="contact" placeholder="seu@email.com ou usuario#1234" required>
            </div>

            <!-- Botão de envio -->
            <button type="submit" class="btn-enviar" id="submitBtn">
                <span>📤</span> Enviar Reporte
            </button>
        </form>

        <!-- Área de mensagens -->
        <div id="messageArea"></div>
    </div>

    <script>
        (function() {
            // ===== CONFIGURAÇÃO =====
            const WEBHOOK_URL = 'https://discord.com/api/webhooks/1501253427760468018/vnv4D5sRLpne5xdReeVDFmUOhTWw80Jd56M0RdeNM9n93WFFDErzP4dU3lZBKSPgyyol';

            // ===== ELEMENTOS =====
            const form = document.getElementById('reportForm');
            const severityButtons = document.querySelectorAll('#severityGroup .sev-btn');
            const severityInput = document.getElementById('severityInput');
            const messageArea = document.getElementById('messageArea');
            const submitBtn = document.getElementById('submitBtn');

            let selectedSeverity = 'low';

            // ===== SELEÇÃO DE SEVERIDADE =====
            severityButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    severityButtons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedSeverity = btn.dataset.sev;
                    severityInput.value = selectedSeverity;
                });
            });

            // ===== FUNÇÕES AUXILIARES =====
            function showMessage(text, type) {
                messageArea.innerHTML = `<div class="msg ${type}">${text}</div>`;
                setTimeout(() => {
                    if (messageArea.firstChild) messageArea.innerHTML = '';
                }, 8000);
            }

            function clearMessages() {
                messageArea.innerHTML = '';
            }

            // ===== ENVIO DO FORMULÁRIO =====
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearMessages();

                // Validação dos campos
                const title = document.getElementById('title').value.trim();
                const type = document.getElementById('type').value;
                const description = document.getElementById('description').value.trim();
                const expected = document.getElementById('expected').value.trim();
                const actual = document.getElementById('actual').value.trim();
                const contact = document.getElementById('contact').value.trim();

                if (!title || title.length < 5) {
                    showMessage('Título muito curto (mínimo 5 caracteres).', 'error');
                    return;
                }
                if (!type) {
                    showMessage('Selecione o tipo do problema.', 'error');
                    return;
                }
                if (!description || description.length < 20) {
                    showMessage('Descreva o problema com pelo menos 20 caracteres.', 'error');
                    return;
                }
                if (!contact || contact.length < 5) {
                    showMessage('Informe um contato (e-mail ou Discord).', 'error');
                    return;
                }

                // Monta payload para o Discord (embed)
                const severityColor = {
                    'crit': 0xff3860,
                    'high': 0xff6b4a,
                    'med': 0xffab3d,
                    'low': 0x3fb986
                };

                const embed = {
                    title: `🗒️ ${title}`,
                    color: severityColor[selectedSeverity] || 0x4f8fff,
                    timestamp: new Date().toISOString(),
                    footer: {
                        text: 'PaltrixAI Bug Report'
                    },
                    fields: [
                        { name: 'Tipo', value: type === 'security' ? '🔒 Segurança' : type === 'bug' ? '🐛 Bug' : type === 'privacy' ? '🔐 Privacidade' : '⚡ Performance', inline: true },
                        { name: 'Severidade', value: selectedSeverity.toUpperCase(), inline: true },
                        { name: 'Contato', value: contact, inline: false },
                        { name: 'Descrição', value: description.length > 1024 ? description.substring(0, 1020) + '...' : description }
                    ]
                };

                // Adiciona comportamentos se preenchidos
                if (expected) embed.fields.push({ name: 'Comportamento Esperado', value: expected });
                if (actual) embed.fields.push({ name: 'Comportamento Atual', value: actual });

                // Conteúdo em texto (fallback)
                const textContent = `**Novo Reporte de ${type === 'security' ? 'Segurança' : 'Bug'}** - Severidade \`${selectedSeverity.toUpperCase()}\`\n📌 **${title}**\n👤 Contato: ${contact}\n📝 ${description.substring(0, 300)}`;

                const payload = {
                    content: textContent,
                    embeds: [embed]
                };

                // Desabilita botão durante envio
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span>⏳</span> Enviando...';

                try {
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        showMessage('✅ Reporte enviado com sucesso para a equipe!', 'success');
                        // Limpa formulário
                        form.reset();
                        severityButtons.forEach(b => b.classList.remove('selected'));
                        const lowBtn = document.querySelector('#severityGroup .sev-btn[data-sev="low"]');
                        if (lowBtn) lowBtn.classList.add('selected');
                        selectedSeverity = 'low';
                        severityInput.value = 'low';
                    } else if (response.status === 429) {
                        showMessage('⚠️ Limite de requisições do Discord atingido. Aguarde um pouco e tente novamente.', 'error');
                    } else {
                        const text = await response.text();
                        showMessage(`❌ Erro ao enviar reporte (${response.status}): ${text.substring(0, 100)}`, 'error');
                    }
                } catch (err) {
                    console.error(err);
                    showMessage('❌ Erro de conexão. Verifique sua internet e tente novamente.', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>📤</span> Enviar Reporte';
                }
            });
        })();
    </script>
</body>
</html>
