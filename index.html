<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaltrixAI - Canal de Suporte</title>
    <style>
        /* ===== RESET E BASE (mesmo estilo do sistema de reports) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0c0c0c;
            color: #d4d4d4;
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 24px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 16px;
        }

        /* ===== FORMULÁRIO ===== */
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #bbb;
        }
        label .req {
            color: #ff3860;
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 12px;
            color: #eee;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border 0.2s;
            resize: vertical;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4f8fff;
        }
        textarea {
            min-height: 90px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
        }
        select {
            cursor: pointer;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }

        /* ===== PRIORIDADE (estilo similar à severidade) ===== */
        .priority-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .prio-btn {
            background: #1e1e1e;
            border: 2px solid #333;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .prio-btn:hover {
            border-color: #666;
        }
        .prio-btn.selected {
            border-color: #fff;
            color: #fff;
        }
        .prio-btn.urgent { color: #ff3860; }
        .prio-btn.high   { color: #ff6b4a; }
        .prio-btn.medium { color: #ffab3d; }
        .prio-btn.low    { color: #3fb986; }
        .prio-btn.urgent.selected { background: rgba(255,56,96,0.15); border-color: #ff3860; }
        .prio-btn.high.selected   { background: rgba(255,107,74,0.15); border-color: #ff6b4a; }
        .prio-btn.medium.selected { background: rgba(255,171,61,0.15); border-color: #ffab3d; }
        .prio-btn.low.selected    { background: rgba(63,185,134,0.15); border-color: #3fb986; }

        /* ===== BOTÃO ===== */
        .btn-enviar {
            background: #4f8fff;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-enviar:hover {
            background: #5d9fff;
        }
        .btn-enviar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== MENSAGENS ===== */
        .msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .msg.success {
            background: rgba(63,185,134,0.15);
            border-left: 3px solid #3fb986;
            color: #3fb986;
        }
        .msg.error {
            background: rgba(255,56,96,0.15);
            border-left: 3px solid #ff3860;
            color: #ff3860;
        }
        .msg.info {
            background: rgba(79,143,255,0.1);
            border-left: 3px solid #4f8fff;
            color: #4f8fff;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 500px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🎧</span> Canal de Suporte
        </h1>
        <p class="subtitle">
            Precisa de ajuda? Abra um ticket de suporte e nossa equipe responderá o mais rápido possível.<br>
            Todos os chamados são enviados diretamente para o Discord da equipe.
        </p>

        <!-- FORMULÁRIO DE SUPORTE -->
        <form id="supportForm">
            <!-- Nome e Contato -->
            <div class="row">
                <div class="form-group">
                    <label for="name">Seu nome <span class="req">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Ex: João Silva" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="contact">Contato (Email ou Discord) <span class="req">*</span></label>
                    <input type="text" id="contact" name="contact" placeholder="email@exemplo.com ou usuario#1234" required maxlength="150">
                </div>
            </div>

            <!-- Assunto e Categoria -->
            <div class="row">
                <div class="form-group">
                    <label for="subject">Assunto <span class="req">*</span></label>
                    <input type="text" id="subject" name="subject" placeholder="Resumo do problema" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="category">Categoria <span class="req">*</span></label>
                    <select id="category" name="category" required>
                        <option value="">Selecione...</option>
                        <option value="technical">🔧 Problema Técnico</option>
                        <option value="account">👤 Conta / Acesso</option>
                        <option value="feature">💡 Sugestão de Funcionalidade</option>
                        <option value="other">📌 Outro</option>
                    </select>
                </div>
            </div>

            <!-- Prioridade -->
            <div class="form-group">
                <label>Prioridade <span class="req">*</span></label>
                <div class="priority-options" id="priorityGroup">
                    <span class="prio-btn urgent" data-prio="urgent">Urgente</span>
                    <span class="prio-btn high"   data-prio="high">Alta</span>
                    <span class="prio-btn medium selected" data-prio="medium">Média</span>
                    <span class="prio-btn low"    data-prio="low">Baixa</span>
                </div>
                <input type="hidden" name="priority" id="priorityInput" value="medium">
            </div>

            <!-- Mensagem -->
            <div class="form-group">
                <label for="message">Descreva seu problema/dúvida <span class="req">*</span></label>
                <textarea id="message" name="message" placeholder="Forneça o máximo de detalhes: o que aconteceu, quando, prints (se possível)..." required></textarea>
            </div>

            <!-- Botão de envio -->
            <button type="submit" class="btn-enviar" id="submitBtn">
                <span>📤</span> Abrir Chamado
            </button>
        </form>

        <!-- Área de mensagens -->
        <div id="messageArea"></div>
    </div>

    <script>
        (function() {
            // ===== CONFIGURAÇÃO DO WEBHOOK =====
            // ⚠️ Substitua pela URL do webhook do canal de suporte no Discord
            const WEBHOOK_URL = 'https://discord.com/api/webhooks/1501253427760468018/vnv4D5sRLpne5xdReeVDFmUOhTWw80Jd56M0RdeNM9n93WFFDErzP4dU3lZBKSPgyyol';

            // ===== ELEMENTOS =====
            const form = document.getElementById('supportForm');
            const priorityButtons = document.querySelectorAll('#priorityGroup .prio-btn');
            const priorityInput = document.getElementById('priorityInput');
            const messageArea = document.getElementById('messageArea');
            const submitBtn = document.getElementById('submitBtn');

            let selectedPriority = 'medium';

            // ===== SELEÇÃO DE PRIORIDADE =====
            priorityButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    priorityButtons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedPriority = btn.dataset.prio;
                    priorityInput.value = selectedPriority;
                });
            });

            // ===== FUNÇÕES AUXILIARES =====
            function showMessage(text, type) {
                messageArea.innerHTML = `<div class="msg ${type}">${text}</div>`;
                setTimeout(() => {
                    if (messageArea.firstChild) messageArea.innerHTML = '';
                }, 8000);
            }

            function clearMessages() {
                messageArea.innerHTML = '';
            }

            // ===== ENVIO DO FORMULÁRIO =====
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearMessages();

                // Validação dos campos
                const name = document.getElementById('name').value.trim();
                const contact = document.getElementById('contact').value.trim();
                const subject = document.getElementById('subject').value.trim();
                const category = document.getElementById('category').value;
                const message = document.getElementById('message').value.trim();

                if (!name || name.length < 2) {
                    showMessage('Informe seu nome.', 'error');
                    return;
                }
                if (!contact || contact.length < 5) {
                    showMessage('Informe um contato válido (e-mail ou Discord).', 'error');
                    return;
                }
                if (!subject || subject.length < 5) {
                    showMessage('O assunto deve ter pelo menos 5 caracteres.', 'error');
                    return;
                }
                if (!category) {
                    showMessage('Selecione uma categoria.', 'error');
                    return;
                }
                if (!message || message.length < 20) {
                    showMessage('Descreva o problema com pelo menos 20 caracteres.', 'error');
                    return;
                }

                // Monta payload para o Discord (embed)
                const priorityColor = {
                    'urgent': 0xff3860,
                    'high': 0xff6b4a,
                    'medium': 0xffab3d,
                    'low': 0x3fb986
                };

                const categoryEmoji = {
                    'technical': '🔧',
                    'account': '👤',
                    'feature': '💡',
                    'other': '📌'
                };

                const embed = {
                    title: `🎫 ${subject}`,
                    color: priorityColor[selectedPriority] || 0x4f8fff,
                    timestamp: new Date().toISOString(),
                    footer: {
                        text: 'PaltrixAI Suporte'
                    },
                    fields: [
                        { name: '👤 Nome', value: name, inline: true },
                        { name: '📞 Contato', value: contact, inline: true },
                        { name: '📂 Categoria', value: `${categoryEmoji[category] || ''} ${category.charAt(0).toUpperCase() + category.slice(1)}`, inline: true },
                        { name: '⚠️ Prioridade', value: selectedPriority.toUpperCase(), inline: true },
                        { name: '📝 Mensagem', value: message.length > 1024 ? message.substring(0, 1020) + '...' : message }
                    ]
                };

                // Texto simples (fallback)
                const textContent = `**Novo chamado de suporte** - Prioridade \`${selectedPriority.toUpperCase()}\`\n👤 ${name} (${contact})\n📌 ${subject}\n📂 Categoria: ${category}\n📝 ${message.substring(0, 300)}`;

                const payload = {
                    content: textContent,
                    embeds: [embed]
                };

                // Desabilita botão durante envio
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span>⏳</span> Enviando...';

                try {
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        showMessage('✅ Chamado enviado com sucesso! Nossa equipe entrará em contato.', 'success');
                        form.reset();
                        // Resetar prioridade para "Média"
                        priorityButtons.forEach(b => b.classList.remove('selected'));
                        const mediumBtn = document.querySelector('#priorityGroup .prio-btn[data-prio="medium"]');
                        if (mediumBtn) mediumBtn.classList.add('selected');
                        selectedPriority = 'medium';
                        priorityInput.value = 'medium';
                    } else if (response.status === 429) {
                        showMessage('⚠️ Muitas requisições. Aguarde um instante e tente novamente.', 'error');
                    } else {
                        const text = await response.text();
                        showMessage(`❌ Erro ao enviar chamado (${response.status}): ${text.substring(0, 100)}`, 'error');
                    }
                } catch (err) {
                    console.error(err);
                    showMessage('❌ Erro de conexão. Verifique sua internet.', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>📤</span> Abrir Chamado';
                }
            });
        })();
    </script>
</body>
</html>
